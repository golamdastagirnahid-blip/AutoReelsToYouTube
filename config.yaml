# ============================================
# AutoReelsToYouTube — Configuration
# Edit this file to customize behavior.
# ============================================

project:
  name: AutoReelsToYouTube
  language: en
  format: shorts          # shorts | longform | both
  timezone: Asia/Dhaka    # used for humanized scheduling

# --------------------------------------------
# NICHES — multi-niche rotation
# Each niche has keywords used for Reel discovery
# and a default "vibe" for script tone + music.
# --------------------------------------------
niches:
  - name: motivation
    # Visual keywords → used for Pexels/Pixabay (stock video search).
    keywords:
      - sunrise mountain
      - city skyline aerial
      - runner determination
      - person silhouette sunset
      - climbing peak
      - workout intense
      - waves ocean storm
      - athlete training
      - lighthouse storm
      - mountain hiking
    # Topical hashtags → used for TikTok hashtag pages.
    tiktok_keywords:
      - motivation
      - mindset
      - success
      - discipline
      - inspiration
      - grind
      - hustle
    tone: powerful, inspiring, urgent
    music_style: epic, cinematic, uplifting
    # Curated public Instagram profiles. Empty = skip Instagram.
    # NOTE: requires an "aged" Instagram account; new accounts get blocked.
    creator_profiles: []

  - name: psychology_facts
    keywords:
      - human brain
      - eye closeup macro
      - thinking person silhouette
      - chess game closeup
      - meditation mindfulness
      - neon abstract patterns
      - candle flame slow motion
      - water drops macro
      - sleeping person night
    tiktok_keywords:
      - psychologyfacts
      - psychology
      - mindfacts
      - braintricks
      - humanbehavior
      - didyouknow
    tone: curious, intriguing, factual
    music_style: mysterious, ambient
    creator_profiles: []

  - name: tech_facts
    keywords:
      - server room data center
      - circuit board macro
      - hologram futuristic ui
      - smartphone closeup
      - robot arm
      - neural network visualization
      - city night neon
      - keyboard typing close
      - drone flight aerial
      - cyberpunk lights
    tiktok_keywords:
      - techfacts
      - ai
      - technology
      - futuretech
      - gadgets
      - techtips
      - techtok
    tone: exciting, futuristic, informative
    music_style: electronic, tech
    creator_profiles: []

  - name: life_hacks
    keywords:
      - kitchen cooking hands
      - home organization
      - desk setup productivity
      - cleaning tips
      - tools workshop
      - notebook writing planning
      - coffee morning routine
      - phone charging
    tiktok_keywords:
      - lifehack
      - lifehacks
      - tipsandtricks
      - productivity
      - dailytips
      - householdtips
    tone: friendly, helpful, clear
    music_style: upbeat, positive
    creator_profiles: []

  - name: fitness
    keywords:
      - gym workout intense
      - running outdoor training
      - barbell deadlift
      - boxing training closeup
      - yoga studio
      - athlete sweat slow motion
      - calisthenics park
      - swimming pool athlete
      - hiit workout
    tiktok_keywords:
      - fitness
      - gym
      - workout
      - fitnesstips
      - gymmotivation
      - fittok
    tone: energetic, motivating
    music_style: high-energy, rock, edm
    creator_profiles: []

  # Animals & wildlife — rare species, behavior, hidden facts. Enormous
  # curiosity gap: viewers click for "I didn't know that" reveals. Tons of
  # royalty-free footage on Pexels/Pixabay (nature, wildlife, macro, ocean).
  - name: animals
    keywords:
      - rare wildlife closeup
      - deep sea creatures
      - exotic bird tropical
      - predator hunting slow motion
      - insects macro extreme
      - elephant herd savanna
      - wolf pack snow
      - octopus coral reef
      - shark underwater blue
      - frog rainforest macro
      - owl night forest
      - cheetah running speed
    tiktok_keywords:
      - animalfacts
      - wildlife
      - rareanimals
      - natureisamazing
      - animalbehavior
      - crazyanimals
      - didyouknowanimals
    tone: fascinating, surprising, awe-inspiring
    music_style: documentary, cinematic, curious
    creator_profiles: []

  # Space & cosmic science — galaxies, black holes, planets, hidden facts
  # about the universe. Works brilliantly on Shorts: the "whoa, space is
  # wild" hook is one of the top-performing templates of all time. NASA
  # + ESA imagery is public domain; Pexels/Pixabay have endless renders.
  - name: space_science
    keywords:
      - galaxy spiral nebula
      - black hole visualization
      - earth from space
      - mars surface landscape
      - astronaut spacewalk
      - saturn rings closeup
      - milky way night sky
      - space telescope deep field
      - solar flare sun
      - meteor shower time lapse
      - iss orbiting earth
      - exoplanet distant world
    tiktok_keywords:
      - spacefacts
      - cosmos
      - astronomy
      - universe
      - nasa
      - spaceexploration
      - mindblown
      - didyouknowspace
    tone: mind-blowing, mysterious, awe-inspiring
    music_style: epic, cinematic, cosmic-ambient
    creator_profiles: []

  # Remote & unexplored — deep ocean, abandoned places, ancient ruins,
  # remote tribes, frozen wastelands. Pure curiosity bait: viewers can't
  # scroll past "a place 99%% of humans will never see". Evergreen, high
  # retention, and the content has no political / brand sensitivity risk.
  - name: unexplored_world
    keywords:
      - deep ocean abyss
      - abandoned place overgrown
      - ancient ruins jungle
      - amazon rainforest aerial
      - arctic tundra frozen
      - remote island drone
      - underwater cave diving
      - mountain cave dark
      - sahara desert dunes
      - volcanic crater steam
      - ghost town empty
      - mysterious underwater shipwreck
    tiktok_keywords:
      - unexplored
      - hiddenplaces
      - mysteries
      - abandonedplaces
      - deepsea
      - remoteplaces
      - explorer
      - earthsecrets
    tone: mysterious, adventurous, revealing
    music_style: cinematic, suspenseful, atmospheric
    creator_profiles: []

# --------------------------------------------
# SOURCES
# --------------------------------------------
sources:
  instagram:
    enabled: true
    exclude_verified: true        # skip blue-tick corporate accounts
    min_views: 100000
    min_like_ratio: 0.03          # likes / views
    max_age_days: 30
  tiktok:
    enabled: true                 # public hashtag pages, no login required
    max_results: 8
    min_views: 50000
  copyright_free:
    enabled: true
    providers: [pexels, pixabay]  # both have free APIs
    per_run_quota: 8              # candidates fetched per provider per run

# --------------------------------------------
# DISCOVERY FILTERS
# --------------------------------------------
filters:
  min_duration_sec: 10
  max_duration_sec: 60
  skip_if_contains_brand_logos: true
  skip_if_contains_celebrities: true
  blocklist_file: data/blocklist.txt

# --------------------------------------------
# AI (NVIDIA NIM)
# --------------------------------------------
ai:
  endpoint: https://integrate.api.nvidia.com/v1
  model: zai-org/glm-4.6          # will auto-fallback if unavailable
  fallback_model: meta/llama-3.1-70b-instruct
  temperature: 0.7
  max_tokens: 800

# --------------------------------------------
# VOICEOVER (ElevenLabs)
# --------------------------------------------
voiceover:
  voice_id: pNInz6obpgDQGcFmaJgB  # Adam
  model: eleven_multilingual_v2
  stability: 0.5
  similarity_boost: 0.75
  style: 0.4
  speaker_boost: true
  # Order in which TTS backends are tried. Edge first = fast + reliable.
  # Failing backends are auto-skipped for 24h after 3 consecutive failures.
  # Override to ["edge"] to disable all proxy backends entirely.
  backend_order: [edge, minimax, elevenlabs]

# --------------------------------------------
# SCRIPT
# --------------------------------------------
script:
  hook_duration_sec: 3            # strong hook in first 3 seconds
  max_words_per_second: 2.5       # for sync with video length
  style: informative, professional, engaging

# --------------------------------------------
# VIDEO EDITING
# --------------------------------------------
editing:
  resolution: 1080x1920           # vertical for Shorts
  fps: 30
  multiclip:
    enabled: true                 # stitch 2-8 clips with crossfades (pro look)
    target_clips: 5               # how many clips to use in the final video
    fade_duration_sec: 0.4        # crossfade length between clips
    min_clips_for_multi: 2        # fewer than this → single-clip mode
  transition_sfx:
    enabled: true                 # whoosh/swoosh sound on each crossfade
    volume_db: -8                 # SFX level (sits on top of music + VO)
                                  # -8 = punchy / pro YouTuber feel
                                  # -14 = subtle / cinematic
                                  # -20 = barely there
  filters:
    saturation: 1.25
    sharpen: true
    hdr_look: true
    upscale_to_4k: false          # keep off to save render time
  subject_tracking:
    enabled: true
    style: circle                 # circle | arrow | auto
    only_when_useful: true        # AI decides per-scene
  hook_overlay:
    enabled: true
    font_size: 72
    position: center-top
  captions:
    enabled: true
    whisper_model: tiny.en          # tiny.en | base.en | small.en
    language: en                    # 'auto' for auto-detect
    font_name: Impact               # drop a TTF in data/fonts/ to use custom
    font_size: 96
    primary_color: "#FFFFFF"        # word color
    outline_color: "#000000"        # thick black outline
    highlight_color: "#FFEB3B"      # reserved for active-word highlight
    outline_px: 6
    margin_v: 520                   # vertical position from bottom (1080x1920)
    pop_animation: true             # scale-in pop effect per chunk
    uppercase: true                 # ALL CAPS like viral shorts
    max_words_per_chunk: 2          # 1-2 = TikTok/Submagic style
    max_chars_per_chunk: 14
  # NOTE: background music has been removed from the pipeline by request.
  # Audio is now: voiceover + transition SFX only. This eliminates a class
  # of ffmpeg filter-graph bugs around music ducking/sidechain compression
  # and removes any need for licensing/attribution sidecars.

# --------------------------------------------
# UPLOAD SCHEDULE
# --------------------------------------------
upload:
  # 5/day not 6: YouTube Data API v3 default quota is 10,000 units/day, and
  # each videos.insert costs 1,600 units. 5 uploads = 8,000 units, giving
  # a 20% safety headroom for retries + auxiliary calls (channels.list,
  # playlistItems.insert etc.). 6/day = 9,600 units and any single retry
  # tips the whole day over → all further uploads blocked for 24h.
  videos_per_day: 5
  humanize: true
  # Hours are UTC (GitHub Actions runs in UTC). Global YouTube Shorts
  # engagement peaks roughly 16:00-22:00 UTC (US afternoon/evening + EU
  # evening). This 15:00-23:00 window concentrates all 5 daily slots
  # inside/adjacent to that peak for maximum first-hour impressions.
  window_start_hour: 15           # 15:00 UTC (= 11:00 EDT / 17:00 CEST / 23:00 ICT)
  window_end_hour: 23             # 23:00 UTC (= 19:00 EDT / 01:00 CEST+1 / 07:00 ICT+1)
  jitter_minutes: 35              # ± random offset per slot
  description_template: |
    {ai_description}

    ━━━━━━━━━━━━━━━━━━━━
    🎬 Credit: Original video by @{creator_handle}
    🔗 Source: {source_url}
    ━━━━━━━━━━━━━━━━━━━━

    Disclaimer: All credit goes to the original creator.
    If you are the owner and want this video removed,
    please contact: {owner_email}

    #shorts #{niche} {hashtags}

# --------------------------------------------
# SAFETY
# --------------------------------------------
safety:
  duplicate_check: true           # hash videos to prevent reposts
  dry_run: false                  # LIVE — videos will be uploaded to YouTube
  max_retries: 3
