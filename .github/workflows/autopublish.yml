name: AutoReels — produce (generate videos)

# PRODUCE-ONLY workflow. Uploads are handled by upload.yml on a 15-min
# cron so scheduled slots fire within 15 min of their due time instead
# of waiting up to 4h for this job.
on:
  # PAUSED — automatic schedule disabled by user request.
  # To resume: uncomment the `schedule` block below.
  # schedule:
  #   # Every 4h — producing a video is expensive (~3 min on GHA runners).
  #   - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Pipeline mode"
        required: true
        default: "produce"
        type: choice
        options: [produce, upload, full]
      niche:
        description: "Niche (leave empty for random)"
        required: false
        default: ""
      count:
        description: "How many to produce"
        required: false
        default: "1"

permissions:
  contents: write   # so we can commit the SQLite tracker back to the repo

concurrency:
  # Share the same group as upload.yml so produce and upload never run
  # simultaneously and stomp on tracker.db.
  group: autoreels-state
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore tracker DB + produced videos (if cached)
        # CRITICAL: also cache data/processed/ because GitHub Actions runners
        # are stateless. If we don't persist the MP4s, videos produced in run A
        # cannot be uploaded in run B (when their scheduled slot fires).
        uses: actions/cache@v4
        with:
          path: |
            data/tracker.db
            data/processed
            data/sfx
          key: autoreels-state-${{ github.run_id }}
          restore-keys: |
            autoreels-state-
            tracker-db-

      - name: Run pipeline
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
          INSTAGRAM_PASSWORD: ${{ secrets.INSTAGRAM_PASSWORD }}
          OWNER_CONTACT_EMAIL: ${{ secrets.OWNER_CONTACT_EMAIL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Scheduled runs default to `produce` (no upload here — upload.yml
          # handles that on a 15-min cadence). Manual dispatch can still pick
          # `full` if the user wants back-to-back produce+upload on demand.
          MODE="${{ github.event.inputs.mode || 'produce' }}"
          NICHE="${{ github.event.inputs.niche }}"
          COUNT="${{ github.event.inputs.count || '1' }}"
          ARGS="$MODE --count $COUNT"
          if [ -n "$NICHE" ]; then ARGS="$ARGS --niche $NICHE"; fi
          python -m src.main $ARGS

      - name: Save tracker DB as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tracker-db
          path: data/tracker.db
          if-no-files-found: ignore
          retention-days: 30
