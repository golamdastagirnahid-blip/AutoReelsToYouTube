name: AutoReels — produce & publish

on:
  schedule:
    # Runs every 4 hours. The pipeline picks up "due" slots only.
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Pipeline mode"
        required: true
        default: "full"
        type: choice
        options: [produce, upload, full]
      niche:
        description: "Niche (leave empty for random)"
        required: false
        default: ""
      count:
        description: "How many to produce"
        required: false
        default: "1"

permissions:
  contents: write   # so we can commit the SQLite tracker back to the repo

concurrency:
  group: autoreels
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore tracker DB + produced videos (if cached)
        # CRITICAL: also cache data/processed/ because GitHub Actions runners
        # are stateless. If we don't persist the MP4s, videos produced in run A
        # cannot be uploaded in run B (when their scheduled slot fires).
        uses: actions/cache@v4
        with:
          path: |
            data/tracker.db
            data/processed
            data/sfx
          key: autoreels-state-${{ github.run_id }}
          restore-keys: |
            autoreels-state-
            tracker-db-

      - name: Run pipeline
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
          INSTAGRAM_PASSWORD: ${{ secrets.INSTAGRAM_PASSWORD }}
          OWNER_CONTACT_EMAIL: ${{ secrets.OWNER_CONTACT_EMAIL }}
        run: |
          MODE="${{ github.event.inputs.mode || 'full' }}"
          NICHE="${{ github.event.inputs.niche }}"
          COUNT="${{ github.event.inputs.count || '1' }}"
          ARGS="$MODE --count $COUNT"
          if [ -n "$NICHE" ]; then ARGS="$ARGS --niche $NICHE"; fi
          python -m src.main $ARGS

      - name: Save tracker DB as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tracker-db
          path: data/tracker.db
          if-no-files-found: ignore
          retention-days: 30
